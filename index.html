<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js" defer></script>
<script src="app.js" defer></script>

<body>
    <div id="backup-banner" style="display:none">
        ⚠️ Last export was <span id="backup-days"></span> days ago. 
        <button onclick="document.getElementById('tabs').querySelector('[data-tab=export]').click()">
            Export Now
        </button>
    </div>
    <div id="salary-bar">
        <span id="current-period-label"></span>
            <div id="salary-row">
                <label for="salary-input">Salary this month ($)</label>
                <input type="number" id="salary-input" placeholder="e.g. 3500" min="0">
            </div>
        </div>
    </div>


    <div id="summary">
        <div class="stat-card">
            <span class="stat-label">Income</span>
            <span class="stat-value" id="total-income">$0</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">Expenses</span>
            <span class="stat-value" id="total-expenses">$0</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">Savings</span>
            <span class="stat-value" id="total-savings">$0</span>
        </div>
    </div>


    <div id="tabs">
        <button class="tab-btn active" data-tab="add">Add</button>
        <button class="tab-btn" data-tab="transactions">Transactions</button>
        <button class="tab-btn" data-tab="monthly">Monthly</button>
        <button class="tab-btn" data-tab="export">Export</button>
    </div>


    <div id="main-content">
        <div id="tab-add" class="tab-panel active">
            <div id="type-toggle">
                <button class="type-btn active" data-type="expense">Expense</button>
                <button class="type-btn" data-type="income">Income</button>
            </div>

            <form id="add-form">
                <div class="form-group">
                    <label for="inp-desc">Description</label>
                    <input type="text" id="inp-desc" placeholder="e.g. Grab ride to work">
                </div>

                <div class="form-group">
                    <label for="inp-amount">Amount ($)</label>
                    <input type="number" id="inp-amount" placeholder="0.00" min="0" step="0.01">
                </div>

                <div class="form-group">
                    <label for="inp-date">Date</label>
                    <input type="date" id="inp-date">
                </div>

                <div class="form-group">
                    <label for="inp-category">Category</label>
                    <select id="inp-category">
                        <option value="Food">Food</option>
                        <option value="Family Expense">Family</option>
                        <option value="Leisure">Leisure</option>
                        <option value="Investments">Investment</option>
                        <option value="Transport">Transport</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <button type="button" id="add-btn">Add Transaction</button>
            </form>
        </div>


        <div id="tab-transactions" class="tab-panel">
            <div id="filter-bar">
                <button class="filter-btn active" data-filter="All">All</button>
                <button class="filter-btn" data-filter="Food">Food</button>
                <button class="filter-btn" data-filter="Family Expense">Family</button>
                <button class="filter-btn" data-filter="Leisure">Leisure</button>
                <button class="filter-btn" data-filter="Investments">Investment</button>
                <button class="filter-btn" data-filter="Transport">Transport</button>
            </div>
            <div id="tx-list"></div>
        </div>


        <div id="tab-monthly" class="tab-panel">
            <div id="monthly-list"></div>
        </div>


        <div id="tab-export" class="tab-panel">
            <p id="export-info"></p>
            <button type="button" id="export-btn">Download Excel Report</button>

            <div id="import-section">
                <p id="import-info">Restore data from a previously exported Excel file. Duplicates are skipped automatically.</p>
                <label id="import-label" for="import-input">Import from Excel</label>
                <input type="file" id="import-input" accept=".xlsx" style="display:none">
                <p id="import-result"></p>
            </div>
        </div>
    </div>
</body>
</html>
